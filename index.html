<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Migo Content Team</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>
<div id="loader">
    <div class="spinner"></div>
</div>
<!-- ===========================
HEADER
=========================== -->

<header class="header">

<div class="container">

<div class="logo-box">

<img src="logo.png"
id="logo"
alt="Logo">

<div>

<h2 id="websiteName"></h2>

<p id="websiteCountry"></p>

</div>

</div>

<nav id="menu">

<a href="#whyMigo">Why Migo</a>

<a href="#host">Become Host</a>

<a href="#tutorial">Tutorial</a>

<a href="#faq">FAQ</a>

<a href="#download">Download</a>
<a href="#contact">Contact Team Leader</a>
</nav>

<div class="menu-btn"

id="menuBtn">

☰

</div>

</div>

</header>

<!-- ===========================
HERO
=========================== -->

<section class="hero">

<div class="container hero-grid">

<div class="hero-left">

<div class="badge"

id="heroBadge">

</div>

<h1 id="heroTitle"></h1>

<p id="heroDescription"></p>

<div class="hero-tags"

id="heroTags">

</div>

<div class="hero-buttons">

<a

id="downloadHeroBtn"

class="btn primary">

Download

</a>

<a

id="tutorialHeroBtn"

class="btn secondary">

Tutorial

</a>

</div>

</div>

<div class="hero-right">

<img

src="hero-banner.webp"

alt="Hero"

class="hero-image">

</div>

</div>

</section>

<!-- ===========================
WHY MIGO
=========================== -->

<section

id="whyMigo"

class="section">

<div class="container">

<div class="section-title">

<h2 id="whyTitle"></h2>

<p id="whySubtitle"></p>

</div>

<div

class="cards-grid"

id="whyCards">

</div>

</div>

</section>
<!-- ===========================
BECOME HOST
=========================== -->

<section id="host" class="section">

<div class="container">

<div class="section-title">

<h2 id="hostTitle"></h2>

<p id="hostSubtitle"></p>

</div>

<div
class="cards-grid two-column"
id="hostCards">

</div>

</div>

</section>

<!-- ===========================
HOST BENEFITS
=========================== -->

<section
id="benefits"
class="section">

<div class="container">

<div class="section-title">

<h2 id="benefitsTitle"></h2>

<p id="benefitsSubtitle"></p>

</div>

<div
class="cards-grid two-column"
id="benefitsCards">

</div>

</div>

</section>

<!-- ===========================
TUTORIAL
=========================== -->

<section
id="tutorial"
class="section">

<div class="container tutorial-layout">

<div class="tutorial-left">

<h2 id="tutorialTitle"></h2>

<p id="tutorialSubtitle"></p>

<ul
id="tutorialSteps">

</ul>

<a
id="tutorialBtn"
class="btn primary">

Watch Tutorial

</a>

</div>

<div class="tutorial-right">

<iframe

id="tutorialVideo"

allowfullscreen>

</iframe>

</div>

</div>

</section>

<!-- ===========================
FAQ + NEED HELP
=========================== -->

<section
id="faq"
class="section">

<div class="container faq-layout">

<div class="faq-left">

<h2 id="faqTitle"></h2>

<p id="faqSubtitle"></p>

<div
id="faqContainer">

</div>

</div>

<div class="help-right">

<h2 id="helpTitle"></h2>

<p id="helpDescription"></p>

<div class="help-buttons">

<a
id="whatsappBtn"
class="btn primary">

WhatsApp

</a>

<a
id="facebookBtn"
class="btn secondary">

Facebook

</a>

</div>

</div>

</div>

</section>
<!-- ===========================
DOWNLOAD
=========================== -->

<section id="download" class="section">

<div class="container">

<div class="download-box">

<h2 id="downloadTitle"></h2>

<p id="downloadDescription"></p>

<a
id="downloadBtn"
class="btn primary">

Download Migo

</a>

</div>

</div>

</section>

<!-- ===========================
FOOTER
=========================== -->

<footer class="footer">

<div class="container footer-content">

<img
src="logo.png"
id="footerLogo"
alt="Logo">

<div>

<h3 id="footerCompany"></h3>

<p id="footerCopyright"></p>

<small id="footerMadeWith"></small>

</div>

</div>

</footer>
<section class="contact-leader">
    <div class="container">
        <button id="contactLeaderBtn" class="btn primary">
            📞 Contact Team Leader
        </button>
    </div>
</section>
<button id="backToTop">
↑
</button>
<div id="leaderModal" class="leader-modal">
    <div class="leader-card">
        <span class="close-modal">&times;</span>

        <img src="solayman.png" alt="Solayman" class="leader-photo">

        <h2>Solayman</h2>
        <p class="leader-role">Content Team Lead</p>

        <div class="leader-info">
            <p><strong>Migo ID:</strong> 100356356</p>
            <p><strong>WhatsApp:</strong> +60 13-451 7714</p>
        </div>

        <div class="leader-buttons">
            <a href="https://wa.me/60134517714" target="_blank" class="btn primary">
                💬 Chat on WhatsApp
            </a>

            <button class="btn secondary">
                🆔 Migo ID: 100356356
            </button>
        </div>
    </div>
</div>

<script src="config.js"></script>

<script src="script.js"></script>

</body>

</html>
